<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">
<div class="card p-4" style="width:400px;">
<h3 class="text-center">Register</h3>

<input type="text" id="name" class="form-control mt-3" placeholder="Name">
<input type="email" id="email" class="form-control mt-2" placeholder="Email">
<input type="password" id="password" class="form-control mt-2" placeholder="Password">

<button onclick="register()" class="btn btn-success w-100 mt-3">Register</button>

</div>
</div>

<script>
function register(){
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if(name === "" || email === "" || pass === ""){
        alert("Fill all details");
    } else {
        window.location.href = "index.html";
    }
}
</script>

</body>
</html>
