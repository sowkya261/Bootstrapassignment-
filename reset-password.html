<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">
<div class="card p-4">
<h4>Reset Password</h4>

<input type="password" id="newpass" class="form-control mt-3" placeholder="New password">
<input type="password" id="confpass" class="form-control mt-2" placeholder="Confirm password">

<button onclick="resetPass()" class="btn btn-danger w-100 mt-3">Reset</button>

</div>
</div>

<script>
function resetPass(){
    let p1 = document.getElementById("newpass").value;
    let p2 = document.getElementById("confpass").value;

    if(p1 === "" || p2 === ""){
        alert("Fill all fields");
    } else if(p1 !== p2){
        alert("Passwords do not match");
    } else {
        window.location.href = "index.html";
    }
}
</script>

</body>
</html>
