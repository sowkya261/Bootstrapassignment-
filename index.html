<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dark">

<div class="container d-flex justify-content-center align-items-center vh-100">
<div class="card p-4" style="width:350px;">
<h3 class="text-center">Login</h3>

<input type="email" id="email" class="form-control mt-3" placeholder="Email">
<input type="password" id="password" class="form-control mt-2" placeholder="Password">

<button onclick="login()" class="btn btn-primary w-100 mt-3">Login</button>

<div class="text-center mt-2">
<a href="forgot-password.html">Forgot password?</a><br>
<a href="register.html">Create account</a>
</div>

</div>
</div>

<script>
function login(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if(email === "" || pass === ""){
        alert("Please fill all fields");
    } else {
        window.location.href = "dashboard.html";
    }
}
</script>

</body>
</html>
